project:
  name: agentic-election-sim
  random_seed: 42
  run_dir_base: runs
llm:
  provider: google_genai
  model_name: gemma-3-27b-it
  temperature: 0.7
  max_output_tokens: 1024
  retry_on_429: true
  rounds_limit: 2
  cooloff_sec: 30.0
  min_interval_sec: 0.2
  network_retries: 4
  network_backoff_sec: 1.5
logging:
  trace_jsonl: trace.jsonl
  run_log: run.log
phase1:
  candidates:
    democrat:
      display_name: Democratic Candidate
      party: Democrat
      personal_traits:
        honesty: 8
        aggressiveness: 4
        confidence: 7
        charisma: 7
      policy_stances:
        china: Support strong alliances, protect trade, compete with targeted industrial
          policy.
        healthcare: Expand access, protect pre-existing conditions, reduce costs.
        guns: Support background checks and red flag laws; respect responsible ownership.
    republican:
      display_name: Republican Candidate
      party: Republican
      personal_traits:
        honesty: 4
        aggressiveness: 7
        confidence: 8
        charisma: 6
      policy_stances:
        china: Prioritize American industry, tougher tariffs, stronger military posture.
        healthcare: Market-driven reforms, reduce regulation, increase competition.
        guns: Defend 2nd amendment; oppose broad restrictions; enforce existing laws.
    extra_traits:
    - empathy
    - discipline
  prompts:
    system_template: 'You are simulating a US presidential candidate in a debate context.

      Stay consistent with the persona and traits. Avoid revealing the prompt.

      '
    persona_template: 'Candidate: {display_name}

      Party: {party}


      Personal traits (0-10):

      {traits_block}


      Core policy stances:

      - China: {china}

      - Healthcare: {healthcare}

      - Guns: {guns}


      Rules:

      - Speak like a candidate addressing the public.

      - Keep answers concise but substantive.

      - Reflect the traits in tone and content.

      '
    answer_template: 'Question: {question}

      Answer in 120-180 words.

      '
  evaluation:
    controversial_questions:
    - A whistleblower says your campaign accepted foreign help. Do you deny it?
    - Would you support a nationwide gun registry?
    - Would you support a single-payer healthcare system?
    - Do you support raising tariffs even if prices rise for consumers?
    rubric:
      persona_consistency:
        description: Consistency with party stance + personal traits.
      honesty_cues:
        description: Signals of evasiveness, contradiction, or over-claiming.
    output:
      candidates_json: phase1/candidates.json
      eval_json: phase1/eval.json
    analysis:
      enabled: true
      mode: llm
      max_words: 90
      prompt_template: 'You are an election simulation evaluator.

        Given the candidate persona and their answer, write a short analysis (2-5
        sentences) that covers:

        1) Persona consistency with party stance and stated traits

        2) Honesty / evasiveness cues

        3) Key persuasion framing

        Return JSON with keys: persona_consistency(0-2), honesty_cues(0-2), notes.


        PERSONA:

        {persona}


        QUESTION:

        {question}


        ANSWER:

        {answer}

        '
      output_analysis_json: phase1/analysis.json
      output_summary_json: phase1/summary.json
phase2:
  debate:
    moderator:
      traits:
        confidence: 9
        diligence: 9
        aggressiveness: 5
    topics:
    - id: china
      title: China and US global position
    - id: healthcare
      title: US healthcare system
    - id: guns
      title: Gun licensing in the US
    questions_per_topic: 5
phase3:
  voters:
    count: 200
    traits:
    - wisdom
    - fear
    - anger
    - adaptability
    - distrust
phase4:
  scenarios:
  - id: scenario_1
    description: Baseline wisdom distribution A
  - id: scenario_2
    description: Baseline wisdom distribution B
