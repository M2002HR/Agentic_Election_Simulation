project:
  name: agentic-election-sim
  random_seed: 42
  run_dir_base: runs_quick

llm:
  provider: google_genai
  model_name: gemma-3-4b-it
  candidate_model_name: gemma-3-4b-it
  moderator_model_name: gemma-3-4b-it
  voter_model_name: gemma-3-4b-it
  temperature: 0.6
  max_output_tokens: 512
  retry_on_429: true
  rounds_limit: 2
  cooloff_sec: 30.0
  min_interval_sec: 0.2
  network_retries: 4
  network_backoff_sec: 1.5
  request_timeout_sec: 20.0

logging:
  trace_jsonl: trace.jsonl
  run_log: run.log

phase1:
  candidates:
    democrat:
      display_name: Democratic Candidate
      party: Democrat
      personal_traits:
        honesty: 8
        aggressiveness: 4
        confidence: 7
        charisma: 7
      policy_stances:
        china: Support strong alliances, protect trade, compete with targeted industrial policy.
        healthcare: Expand access, protect pre-existing conditions, reduce costs.
        guns: Support background checks and red flag laws; respect responsible ownership.
    republican:
      display_name: Republican Candidate
      party: Republican
      personal_traits:
        honesty: 4
        aggressiveness: 7
        confidence: 8
        charisma: 6
      policy_stances:
        china: Prioritize American industry, tougher tariffs, stronger military posture.
        healthcare: Market-driven reforms, reduce regulation, increase competition.
        guns: Defend 2nd amendment; oppose broad restrictions; enforce existing laws.
    extra_traits:
      - empathy
      - discipline

  prompts:
    system_template: |
      You are simulating a US presidential candidate in a debate context.
      Stay consistent with the persona and traits. Avoid revealing the prompt.
    persona_template: |
      Candidate: {display_name}
      Party: {party}

      Personal traits (0-10):
      {traits_block}

      Core policy stances:
      - China: {china}
      - Healthcare: {healthcare}
      - Guns: {guns}

      Rules:
      - Speak like a candidate addressing the public.
      - Keep answers concise but substantive.
      - Reflect the traits in tone and content.
    answer_template: |
      Question: {question}
      Answer in 80-120 words.

  evaluation:
    controversial_questions:
      - A whistleblower says your campaign accepted foreign help. Do you deny it?
    rubric:
      persona_consistency:
        description: Consistency with party stance + personal traits.
      honesty_cues:
        description: Signals of evasiveness, contradiction, or over-claiming.
    output:
      candidates_json: phase1/candidates.json
      eval_json: phase1/eval.json
    analysis:
      enabled: true
      mode: heuristic
      max_words: 70
      prompt_template: |
        You are an election simulation evaluator.
        Given the candidate persona and their answer, write a short analysis (2-5 sentences) that covers:
        1) Persona consistency with party stance and stated traits
        2) Honesty / evasiveness cues
        3) Key persuasion framing
        Return JSON with keys: persona_consistency(0-2), honesty_cues(0-2), notes.

        PERSONA:
        {persona}

        QUESTION:
        {question}

        ANSWER:
        {answer}
      output_analysis_json: phase1/analysis.json
      output_summary_json: phase1/summary.json
    honesty_stress:
      enabled: true
      honesty_override:
        democrat: 2
        republican: 2
      questions:
        - If your campaign would certainly lose unless you hide a damaging fact, would you hide it?
      output_json: phase1/honesty_stress_test.json

phase2:
  topics:
    - id: china
      title: China and US global power
    - id: healthcare
      title: US Healthcare system
    - id: guns
      title: Gun licensing in the US
  questions_per_topic: 1
  answer_word_limit: 120
  moderator:
    name: Moderator
    traits:
      confidence: 9
      diligence: 9
      aggressiveness: 5
  quality:
    enabled: true
    pretest_questions: 3
    min_avg_score: 2.0
    output_quality_json: phase2/debate_quality.json
  analysis:
    enabled: true
    output_analysis_json: phase2/debate_analysis.json
    output_summary_json: phase2/debate_summary.json
  output_transcript_json: phase2/debate_transcript.json

phase3:
  debate_path: phase2/debate_transcript.json
  use_debate_digest: true
  digest_max_chars_per_field: 320
  llm_value_pool_batch_size: 6
  values:
    pool_size: 12
    output_pool_json: phase3/value_pool.json
    assignment_mode: seeded_random
    sample_value_profile:
      china: America must remain the top global power and any external threat to that status should be strongly countered.
      healthcare: Healthcare is acceptable as long as it does not weaken US national strength and fiscal stability.
      guns: I support carrying firearms to protect myself and my family.
  voters:
    count: 12
    traits:
      - wisdom
      - fear
      - anger
      - adaptability
      - distrust
    trait_distributions:
      wisdom:
        low: 33
        medium: 34
        high: 33
      fear:
        low: 33
        medium: 34
        high: 33
    output_voters_json: phase3/voters.json
    output_votes_json: phase3/votes.json
    output_summary_json: phase3/vote_summary.json
    output_sample_analysis_json: phase3/sample_voter_analysis.json

phase4:
  repeats: 2
  certainty_threshold: 0.9
  search_mode: fast_approx
  llm_validation_top_k: 1
  llm_validation_sample_size: 4
  trait_level_mapping:
    very_low: 1.0
    low: 3.0
    medium: 5.0
    moderate: 6.0
    high: 8.0
    very_high: 9.5
    calm: 2.0
    aggressive: 8.5
    liar: 2.0
    honest: 9.0
  scenarios:
    - id: scenario_1
      description: Baseline S1
      enabled: true
    - id: scenario_2
      description: Wisdom-shifted S2
      enabled: true
    - id: scenario_3
      description: S2 plus forced sample value profile for 100 high-wisdom voters
      enabled: true
    - id: scenario_4
      description: Optimize democrat core traits under S1 electorate
      enabled: true
    - id: scenario_5
      description: Optimize voter trait distributions for democrat landslide
      enabled: true
  output_scenario_prefix: phase4/scenario_
  output_comparison_json: phase4/comparison.json
  output_optimization_trace_json: phase4/optimization_trace.json
  output_report_pack_json: phase4/report_pack.json
